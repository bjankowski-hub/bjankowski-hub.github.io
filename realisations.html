      --w:          1080px;
      --px:         clamp(1.25rem, 4vw, 2.5rem);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: var(--w); margin: 0 auto; padding: 0 var(--px); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(238,243,248,.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: .8rem var(--px); max-width: var(--w); margin: 0 auto;
    }
    .nav-back {
      font-family: var(--font-m); font-size: .72rem; color: var(--text-2);
      text-decoration: none; display: flex; align-items: center; gap: .4rem;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--accent); }
    .lang-sw { display: flex; align-items: center; gap: 2px; }
    .lang-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-m); font-size: .72rem; font-weight: 400;
      color: var(--text-3); padding: .2rem .45rem; border-radius: 2px;
      border-bottom: 2px solid transparent; transition: all .2s; line-height: 1;
      letter-spacing: .05em;
    }
    .lang-btn.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .lang-btn:hover:not(.on) { color: var(--text-2); }
    .lang-sep { color: var(--border); font-size: .7rem; padding: 0 2px; }

    /* PAGE HEADER */
    .page-header { padding: 6.5rem 0 2.5rem; }
    .page-label {
      font-family: var(--font-m); font-size: .68rem; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase;
      display: flex; align-items: center; gap: .5rem; margin-bottom: .9rem;
    }
    .page-label::before { content:''; width:16px; height:1px; background:var(--accent); }
    .page-h1 {
      font-family: var(--font-h); font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: normal; letter-spacing: -.02em; line-height: 1.15;
      color: var(--text);
    }

    /* SECTION LABEL */
    .s-div { border-top: 1px solid var(--border); }
    .s-label {
      font-family: var(--font-m); font-size: .68rem; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase;
      display: flex; align-items: center; gap: .5rem; margin-bottom: 2rem;
    }
    .s-label::before { content:''; width:16px; height:1px; background:var(--accent); }

    /* PROJECT CARD */
    section { padding: 4rem 0; }
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border-l);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .proj-card-header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border-l);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap;
      position: relative;
    }
    .proj-card-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--ok);
    }
    .proj-title {
      font-family: var(--font-h); font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: normal; letter-spacing: -.02em; color: var(--text);
    }
    .proj-subtitle-small {
      font-family: var(--font-m); font-size: .7rem; color: var(--text-3);
      margin-top: .3rem; letter-spacing: .03em;
    }
    .proj-badge {
      font-family: var(--font-m); font-size: .63rem;
      color: var(--ok); background: var(--ok-dim); border: 1px solid var(--ok-ln);
      padding: .28rem .7rem; border-radius: 3px; white-space: nowrap;
    }

    .proj-card-body { padding: 2rem 2.5rem; }

    /* BLOCKS GRID */
    .blocks-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
    .block {
      background: var(--bg); border: 1px solid var(--border-l);
      padding: 1.5rem; border-radius: 4px;
    }
    .block-title {
      font-family: var(--font-m); font-size: .63rem; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: .75rem;
    }
    .block-text { font-size: .875rem; color: var(--text-2); line-height: 1.8; text-align: justify; }

    /* STACK */
    .stack-row {
      display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem;
    }
    .stack-tag {
      font-family: var(--font-m); font-size: .65rem;
      color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-ln);
      padding: .25rem .65rem; border-radius: 3px;
    }

    /* WORKFLOW IMAGE */
    .workflow-img-wrap {
      margin-bottom: 2rem;
      border: 1px solid var(--border-l); border-radius: 4px; overflow: hidden;
    }
    .workflow-img-label {
      font-family: var(--font-m); font-size: .63rem; color: var(--text-3);
      letter-spacing: .08em; text-transform: uppercase;
      padding: .6rem 1rem; background: var(--bg);
      border-bottom: 1px solid var(--border-l);
    }
    .workflow-img-wrap img {
      width: 100%; display: block;
    }

    /* NODES */
    .nodes-section { margin-bottom: 2rem; }
    .nodes-label {
      font-family: var(--font-m); font-size: .63rem; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: 1rem;
    }
    .nodes-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem;
    }
    .node-item {
      background: var(--bg); border: 1px solid var(--border-l);
      border-radius: 3px; padding: 1rem 1.1rem;
      display: flex; gap: .75rem; align-items: flex-start;
    }
    .node-num {
      font-family: var(--font-m); font-size: .62rem; color: var(--accent);
      font-weight: 400; white-space: nowrap; padding-top: .05rem;
    }
    .node-content {}
    .node-name { font-size: .82rem; font-weight: 500; color: var(--text); margin-bottom: .2rem; }
    .node-desc { font-size: .78rem; color: var(--text-2); line-height: 1.6; }

    /* STEP BLOCKS (Étape 1 / Étape 2) */
    .step-block { margin-top: 2.5rem; }
    .step-head {
      display: flex; align-items: center; gap: .9rem; flex-wrap: wrap;
      padding-top: 2rem; margin-bottom: 1.25rem;
      border-top: 1px solid var(--border-l);
    }
    .step-eyebrow {
      font-family: var(--font-m); font-size: .64rem; color: var(--text-3);
      letter-spacing: .09em; text-transform: uppercase;
    }
    .step-name {
      font-family: var(--font-h); font-size: 1.05rem; color: var(--text);
      letter-spacing: -.01em;
    }
    .step-pill {
      margin-left: auto;
      font-family: var(--font-m); font-size: .62rem;
      padding: .26rem .68rem; border-radius: 3px; white-space: nowrap;
    }
    .step-pill--done { color: var(--ok); background: var(--ok-dim); border: 1px solid var(--ok-ln); }
    .step-pill--active { color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-ln); }
    .step-text {
      font-size: .875rem; color: var(--text-2); line-height: 1.8;
      text-align: justify; margin-bottom: 1.5rem;
    }

    /* COMING SOON */
    .coming-soon {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 6px; padding: 3rem 2rem;
      text-align: center; color: var(--text-3);
    }
    .coming-soon-icon { font-size: 2rem; margin-bottom: 1rem; }
    .coming-soon-title {
      font-family: var(--font-h); font-size: 1.1rem; color: var(--text-2);
      margin-bottom: .5rem;
    }
    .coming-soon-sub { font-family: var(--font-m); font-size: .72rem; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem var(--px);
      font-family: var(--font-m); font-size: .68rem; color: var(--text-3);
      text-align: center;

    .d2 { transition-delay: .16s; }
    .d3 { transition-delay: .24s; }

    @media (max-width: 700px) {
      .blocks-2 { grid-template-columns: 1fr; }
      .nodes-grid { grid-template-columns: 1fr 1fr; }
      .proj-card-header { flex-direction: column; }
      .step-pill { margin-left: 0; }
    }
    @media (max-width: 480px) {
      .nodes-grid { grid-template-columns: 1fr; }
    }

function render(l) {
  const c = R[l];
  document.documentElement.lang = l;
  document.title = "Bartosz Jankowski — " + c.pageTitle;

  document.getElementById('nav-back-label').textContent = c.navBack;
  document.getElementById('page-label').textContent     = c.pageLabel;
  document.getElementById('page-title').textContent     = c.pageTitle;
  document.getElementById('section-personal').textContent = c.sectionPersonal;
  document.getElementById('p-badge').textContent        = c.badge;
  document.getElementById('p-title').textContent        = c.pTitle;
  document.getElementById('p-subtitle').textContent     = c.pSubtitle;
  document.getElementById('b-obj-title').textContent    = c.objTitle;
  document.getElementById('b-obj-text').textContent     = c.objText;
  document.getElementById('b-usecase-title').textContent = c.usecaseTitle;
  document.getElementById('b-usecase-text').textContent  = c.usecaseText;
  document.getElementById('ft').textContent             = c.footer;

  document.getElementById('steps-container').innerHTML = c.steps.map(s => `
    <div class="step-block">
      <div class="step-head">
        <span class="step-eyebrow">${s.eyebrow}</span>
        <span class="step-name">${s.name}</span>
        <span class="step-pill step-pill--${s.pillType}">${s.pill}</span>
      </div>
      <p class="step-text">${s.text}</p>
      <div class="stack-row">${s.stack.map(t => `<span class="stack-tag">${t}</span>`).join('')}</div>
      <div class="workflow-img-wrap">
        <div class="workflow-img-label">${s.imgLabel}</div>
        <img src="${s.imgSrc}" alt="${s.imgAlt}">
      </div>
      <div class="nodes-section">
        <p class="nodes-label">${s.nodesLabel}</p>
        <div class="nodes-grid">
          ${s.nodes.map(n => `
            <div class="node-item">
              <span class="node-num">${n.num}</span>
              <div class="node-content">
                <div class="node-name">${n.name}</div>
                <div class="node-desc">${n.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`).join('');

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('on', b.dataset.l === l));
}

document.querySelectorAll('.lang-btn').forEach(b =>
  b.addEventListener('click', () => {
    const l = b.dataset.l;
    history.replaceState(null, '', '?lang=' + l);
    render(l);
  }));

const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.05 });

window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const lang = ['fr','en','pl'].includes(urlParams.get('lang')) ? urlParams.get('lang') : 'fr';
  render(lang);
  const els = document.querySelectorAll('.a');
  els.forEach(el => io.observe(el));
  requestAnimationFrame(() => requestAnimationFrame(() => {
    els.forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight + 50)
        el.classList.add('in');
    });
  }));
});
</script>
